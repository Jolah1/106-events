<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ meta.page_title }}</title>
<meta name="description" content="{{ meta.og_description }}">
<link rel="canonical" href="{{ meta.canonical_url }}">
<meta name="theme-color" content="#0f0e0c">
<link rel="icon" type="image/svg+xml" href="/static/favicon-v1.svg">

<!-- Link previews: WhatsApp, Instagram, Facebook, iMessage, Twitter/X -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="106 Events">
<meta property="og:title" content="{{ meta.og_title }}">
<meta property="og:description" content="{{ meta.og_description }}">
<meta property="og:url" content="{{ meta.canonical_url }}">
<meta property="og:image" content="{{ meta.og_image }}">
<meta property="og:image:alt" content="{{ meta.og_image_alt }}">
{% if let Some(dims) = meta.og_image_dims %}
<meta property="og:image:width" content="{{ dims.width }}">
<meta property="og:image:height" content="{{ dims.height }}">
{% endif %}
<meta property="og:locale" content="en_NG">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ meta.og_title }}">
<meta name="twitter:description" content="{{ meta.og_description }}">
<meta name="twitter:image" content="{{ meta.og_image }}">

<style>
/* Fraunces (OFL) — display face. Subsets load on demand via unicode-range;
   the third covers the dot-below vowels Yoruba names need (ẹ, ọ). */
@font-face {
  font-family: 'Fraunces';
  font-style: normal;
  font-display: swap;
  font-weight: 100 900;
  src: url(/static/fonts/fraunces-latin-v1.woff2) format('woff2-variations');
  unicode-range: U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
}
@font-face {
  font-family: 'Fraunces';
  font-style: normal;
  font-display: swap;
  font-weight: 100 900;
  src: url(/static/fonts/fraunces-latin-ext-v1.woff2) format('woff2-variations');
  unicode-range: U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;
}
@font-face {
  font-family: 'Fraunces';
  font-style: normal;
  font-display: swap;
  font-weight: 100 900;
  src: url(/static/fonts/fraunces-vietnamese-v1.woff2) format('woff2-variations');
  unicode-range: U+0102-0103,U+0110-0111,U+0128-0129,U+0168-0169,U+01A0-01A1,U+01AF-01B0,U+0300-0301,U+0303-0304,U+0308-0309,U+0323,U+0329,U+1EA0-1EF9,U+20AB;
}

:root {
  --ink: #0f0e0c;
  --raised: #171613;
  --text: #f2efe9;
  --muted: #a8a29a;
  --gold: #d9b262;
  --gold-bright: #f0cf8a;
  --hairline: rgba(240, 207, 138, 0.14);
}
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--ink);
  color: var(--text);
  font: 400 16px/1.6 system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; }
.wrap { max-width: 640px; margin: 0 auto; padding: 0 20px; }
.seam {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
  opacity: 0.5;
}
.display {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.footer {
  margin: 56px 0 40px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
.footer a { color: var(--muted); text-decoration: none; }
.footer a:hover { color: var(--text); }
.wordmark { font-family: 'Fraunces', Georgia, serif; font-weight: 600; }
.wordmark b { color: var(--gold); font-weight: 600; }
{% block styles %}{% endblock %}
</style>
</head>
<body>
{% block body %}{% endblock %}
<footer class="footer">
  <a href="{{ meta.home_url }}">Powered by <span class="wordmark"><b>106</b> Events</span></a>
</footer>
</body>
</html>
